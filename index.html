<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 今天吃啥？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            font-size: 2.2em;
            margin-bottom: 8px;
            color: #333;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        /* 转盘展示区 */
        .spin-area {
            position: relative;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .result-text {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .result-food {
            font-size: 3em;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.3s;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-food.spinning {
            animation: slotSpin 0.1s infinite;
        }

        @keyframes slotSpin {
            0% { transform: translateY(-5px); opacity: 0.7; }
            50% { transform: translateY(5px); opacity: 1; }
            100% { transform: translateY(-5px); opacity: 0.7; }
        }

        .result-food.reveal {
            animation: revealBounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes revealBounce {
            0% { transform: scale(0.3) rotateX(90deg); opacity: 0; }
            50% { transform: scale(1.15); }
            100% { transform: scale(1) rotateX(0deg); opacity: 1; }
        }

        /* 🎉 撒花 */
        .confetti-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 1.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(200px) rotate(720deg); opacity: 0; }
        }

        /* 按钮 */
        .spin-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.3em;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .spin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .spin-btn:active {
            transform: translateY(0);
        }

        .spin-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spin-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* 添加区域 */
        .add-section {
            margin-bottom: 20px;
        }

        .add-section h3 {
            color: #555;
            margin-bottom: 12px;
            font-size: 1.05em;
        }

        .add-row {
            display: flex;
            gap: 10px;
        }

        .add-row input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .add-row input:focus {
            border-color: #667eea;
        }

        .add-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: #667eea;
            color: white;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .add-btn:hover {
            background: #5a6fd6;
            transform: translateY(-1px);
        }

        /* 食物列表 */
        .food-list-section h3 {
            color: #555;
            margin-bottom: 12px;
            font-size: 1.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .food-count {
            font-size: 0.85em;
            color: #aaa;
            font-weight: 400;
        }

        .food-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
            padding: 4px;
        }

        .food-list::-webkit-scrollbar {
            width: 6px;
        }

        .food-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .food-list::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        .food-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #f0f0f5;
            border-radius: 20px;
            font-size: 0.92em;
            color: #555;
            transition: all 0.2s;
            animation: tagIn 0.3s ease-out;
        }

        @keyframes tagIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .food-tag:hover {
            background: #e8e8f0;
        }

        .food-tag .delete-btn {
            width: 18px;
            height: 18px;
            border: none;
            background: #ccc;
            color: white;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
        }

        .food-tag .delete-btn:hover {
            background: #e74c3c;
            transform: scale(1.1);
        }

        .empty-tip {
            text-align: center;
            color: #bbb;
            padding: 20px;
            font-size: 0.95em;
        }

        /* 历史记录 */
        .history-section {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }

        .history-section h3 {
            color: #555;
            margin-bottom: 10px;
            font-size: 1.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history {
            font-size: 0.8em;
            color: #aaa;
            cursor: pointer;
            border: none;
            background: none;
            transition: color 0.2s;
        }

        .clear-history:hover {
            color: #e74c3c;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .history-item {
            font-size: 0.82em;
            padding: 4px 10px;
            background: #f8f8fc;
            border-radius: 8px;
            color: #888;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
                border-radius: 18px;
            }

            h1 {
                font-size: 1.8em;
            }

            .result-food {
                font-size: 2.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 今天吃啥？</h1>
        <p class="subtitle">选择困难症终结者 · 把决定权交给命运</p>

        <!-- 结果展示 -->
        <div class="spin-area">
            <div class="confetti-container" id="confettiContainer"></div>
            <div class="result-text" id="resultText">点击下方按钮，让命运决定！</div>
            <div class="result-food" id="resultFood">❓</div>
        </div>

        <!-- 开始按钮 -->
        <button class="spin-btn" id="spinBtn" onclick="startSpin()">
            🎰 开始抽奖！
        </button>

        <!-- 添加食物 -->
        <div class="add-section">
            <h3>➕ 添加选项</h3>
            <div class="add-row">
                <input type="text" id="foodInput" placeholder="输入食物名称..." 
                       onkeypress="if(event.key==='Enter') addFood()">
                <button class="add-btn" onclick="addFood()">添加</button>
            </div>
        </div>

        <!-- 食物列表 -->
        <div class="food-list-section">
            <h3>
                📋 候选列表
                <span class="food-count" id="foodCount"></span>
            </h3>
            <div class="food-list" id="foodList"></div>
        </div>

        <!-- 历史记录 -->
        <div class="history-section" id="historySection" style="display:none;">
            <h3>
                📝 抽奖记录
                <button class="clear-history" onclick="clearHistory()">清空</button>
            </h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        // 默认食物列表
        const DEFAULT_FOODS = [
            '火锅', '烧烤', '麻辣烫', '黄焖鸡', '螺蛳粉',
            '兰州拉面', '沙县小吃', '麦当劳', '肯德基', '饺子',
            '炒饭', '米线', '披萨', '寿司', '汉堡',
            '煲仔饭', '烤鱼', '串串香', '冒菜', '酸菜鱼'
        ];

        let foods = [];
        let history = [];
        let isSpinning = false;

        // 初始化
        function init() {
            const saved = localStorage.getItem('foods');
            foods = saved ? JSON.parse(saved) : [...DEFAULT_FOODS];

            const savedHistory = localStorage.getItem('foodHistory');
            history = savedHistory ? JSON.parse(savedHistory) : [];

            renderFoodList();
            renderHistory();
        }

        // 保存数据
        function saveData() {
            localStorage.setItem('foods', JSON.stringify(foods));
            localStorage.setItem('foodHistory', JSON.stringify(history));
        }

        // 渲染食物列表
        function renderFoodList() {
            const container = document.getElementById('foodList');
            const countEl = document.getElementById('foodCount');

            if (foods.length === 0) {
                container.innerHTML = '<div class="empty-tip">还没有选项，快添加一些吧！</div>';
                countEl.textContent = '';
                return;
            }

            countEl.textContent = `共 ${foods.length} 项`;
            container.innerHTML = foods.map((food, index) => `
                <div class="food-tag">
                    <span>${food}</span>
                    <button class="delete-btn" onclick="removeFood(${index})" title="删除">×</button>
                </div>
            `).join('');
        }

        // 添加食物
        function addFood() {
            const input = document.getElementById('foodInput');
            const name = input.value.trim();

            if (!name) return;

            if (foods.includes(name)) {
                shakeInput(input);
                return;
            }

            foods.push(name);
            input.value = '';
            saveData();
            renderFoodList();

            // 滚动到底部
            const list = document.getElementById('foodList');
            list.scrollTop = list.scrollHeight;
        }

        // 输入框抖动
        function shakeInput(el) {
            el.style.animation = 'none';
            el.style.borderColor = '#e74c3c';
            el.offsetHeight; // reflow
            el.style.animation = 'shake 0.4s ease';
            setTimeout(() => {
                el.style.borderColor = '';
                el.style.animation = '';
            }, 400);
        }

        // 删除食物
        function removeFood(index) {
            foods.splice(index, 1);
            saveData();
            renderFoodList();
        }

        // 开始抽奖
        function startSpin() {
            if (isSpinning) return;
            if (foods.length === 0) {
                alert('请先添加一些食物选项！');
                return;
            }

            isSpinning = true;
            const btn = document.getElementById('spinBtn');
            const resultText = document.getElementById('resultText');
            const resultFood = document.getElementById('resultFood');

            btn.disabled = true;
            btn.textContent = '🎰 抽奖中...';
            resultText.textContent = '命运的齿轮开始转动...';
            resultFood.classList.add('spinning');
            resultFood.classList.remove('reveal');

            // 快速切换显示
            let count = 0;
            const totalSteps = 30 + Math.floor(Math.random() * 15);
            let interval = 50;

            function step() {
                const randomFood = foods[Math.floor(Math.random() * foods.length)];
                resultFood.textContent = randomFood;
                count++;

                if (count < totalSteps) {
                    // 逐渐变慢
                    if (count > totalSteps * 0.6) {
                        interval += 15;
                    }
                    if (count > totalSteps * 0.8) {
                        interval += 30;
                    }
                    setTimeout(step, interval);
                } else {
                    // 最终结果
                    const finalFood = foods[Math.floor(Math.random() * foods.length)];
                    resultFood.textContent = finalFood;
                    resultFood.classList.remove('spinning');
                    resultFood.classList.add('reveal');
                    resultText.textContent = '🎉 今天就吃这个！';

                    // 撒花
                    createConfetti();

                    // 记录历史
                    const now = new Date();
                    const timeStr = `${now.getMonth() + 1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
                    history.unshift({ food: finalFood, time: timeStr });
                    if (history.length > 20) history.pop();
                    saveData();
                    renderHistory();

                    // 恢复按钮
                    btn.disabled = false;
                    btn.textContent = '🎰 再来一次！';
                    isSpinning = false;
                }
            }

            step();
        }

        // 撒花效果
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#43e97b', '#fa709a', '#fee140'];

            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                confetti.style.animationDuration = (1 + Math.random()) + 's';
                confetti.style.width = (6 + Math.random() * 8) + 'px';
                confetti.style.height = (6 + Math.random() * 8) + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                container.appendChild(confetti);
            }

            setTimeout(() => {
                container.innerHTML = '';
            }, 2000);
        }

        // 渲染历史
        function renderHistory() {
            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');

            if (history.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            list.innerHTML = history.map(item => `
                <span class="history-item">${item.time} · ${item.food}</span>
            `).join('');
        }

        // 清空历史
        function clearHistory() {
            history = [];
            saveData();
            renderHistory();
        }

        // 添加 shake 动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                75% { transform: translateX(8px); }
            }
        `;
        document.head.appendChild(style);

        // 启动
        init();
    </script>
</body>
</html>
